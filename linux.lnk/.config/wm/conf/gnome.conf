### GNOME settings
# https://github.com/i3-gnome/i3-gnome/wiki/Tips-&-Tricks

# GNOME Settings Daemon
exec_always --no-startup-id /usr/libexec/gsd-xsettings

# GNOME power manager
#exec_always --no-startup-id gnome-power-manager
exec_always --no-startup-id /usr/libexec/gsd-power

# polkit-gnome: sudo authentication
exec_always --no-startup-id /usr/lib/policykit-1-gnome/polkit-gnome-authentication-agent-1

# GNOME Flashback
#exec_always --no-startup-id "gsettings set org.gnome.gnome-flashback desktop false && gnome-flashback"
