### mode definitions (shared between i3 and sway)
#
# i3/sway modes are stateful keymaps: press a trigger key to enter a named
# mode, then a different set of bindings becomes active until you press
# Return or Escape to return to the default mode.
#
# See: https://i3wm.org/docs/userguide.html#binding_modes

### Example — a resize mode triggered by $mod+r:
#
# bindsym $mod+r mode "resize"
#
# mode "resize" {
#     bindsym Left  resize shrink width  10 px or 10 ppt
#     bindsym Down  resize grow   height 10 px or 10 ppt
#     bindsym Up    resize shrink height 10 px or 10 ppt
#     bindsym Right resize grow   width  10 px or 10 ppt
#
#     bindsym Return mode "default"
#     bindsym Escape mode "default"
# }
