### modifier keys: hyper/alt
set $mod Mod4


### update environment
exec systemctl --user import-environment WAYLAND_DISPLAY XDG_CURRENT_DESKTOP WLR_NO_HARDWARE_CURSORS WLR_RENDERER ELECTRON_OZONE_PLATFORM_HINT PATH
exec dbus-update-activation-environment --systemd WAYLAND_DISPLAY XDG_CURRENT_DESKTOP WLR_NO_HARDWARE_CURSORS WLR_RENDERER ELECTRON_OZONE_PLATFORM_HINT PATH


### display configuration
#
# Example configuration:
#
#   output HDMI-A-1 resolution 1920x1080 position 1920,0
#
# You can get the names of your outputs by running: swaymsg -t get_outputs
output * resolution 5120x2160 scale 2.0


### Input configuration
# Example configuration:
#
#   input "2:14:SynPS/2_Synaptics_TouchPad" {
#       dwt enabled
#       tap enabled
#       natural_scroll enabled
#       middle_emulation enabled
#   }
#
# You can get the names of your inputs by running: swaymsg -t get_inputs
# Read `man 5 sway-input` for more information about this section.

input "type:keyboard" {
    xkb_layout us
    xkb_options caps:hyper
}


### darkman
exec --no-startup-id "PORTAL=wlr envsubst < $HOME/.config/xdg-desktop-portal/portals.conf.in > $HOME/.config/xdg-desktop-portal/portals.conf"
exec --no-startup-id systemctl --user import-environment DISPLAY I3SOCK
exec --no-startup-id systemctl --user restart xdg-desktop-portal
exec --no-startup-id systemctl --user restart darkman
# Toggle your theme
bindsym $mod+Shift+d exec darkman toggle


