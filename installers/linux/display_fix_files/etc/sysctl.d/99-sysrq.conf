# Enable the full SysRq command set.
#
# Ubuntu's default is 176 (0xB0) which excludes the R (unraw keyboard)
# and E/I (kill tasks) bits. Without those, the REISUB recovery
# sequence is incomplete, defeating the single most useful tool for
# recovering from a locker/display wedge without a hard reset.
#
# Full documentation: Documentation/admin-guide/sysrq.rst in the kernel
# source. Bit meanings:
#   1   enable all functions
#   2   enable control of console logging level
#   4   enable control of keyboard (SAK, unraw)
#   8   enable debugging dumps of processes etc.
#  16   enable sync command
#  32   enable remount read-only
#  64   enable signalling of processes (term, kill, oom-kill)
# 128   allow reboot/poweroff
# 256   allow nicing of all RT tasks
#
# 1 == all bits enabled.
kernel.sysrq = 1
