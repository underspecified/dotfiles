# Disable all sleep/suspend/hibernate trigger paths via logind.
#
# This host runs GPU experiments where any system sleep event risks
# corrupting in-flight CUDA workloads. DPMS monitor-blank still works
# (that's a display-only action); only system sleep targets are blocked.
#
# Sleep targets are also masked at the systemd level by the installer:
#   systemctl mask sleep.target suspend.target hibernate.target
#                  hybrid-sleep.target suspend-then-hibernate.target
#
# The logind settings below close the other trigger paths (power keys,
# lid switch, idle action) that would otherwise attempt to enter those
# now-masked targets.

[Login]
HandlePowerKey=ignore
HandleSuspendKey=ignore
HandleHibernateKey=ignore
HandleLidSwitch=ignore
HandleLidSwitchExternalPower=ignore
HandleLidSwitchDocked=ignore
IdleAction=ignore
