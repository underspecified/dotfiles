# Pin Xorg primary GPU to the Intel iGPU via the modesetting driver.
# Belt-and-suspenders with nvidia-drm.modeset=0 — forecloses edge cases
# where a future driver update re-enables modeset and nvidia-drm tries
# to claim the provider role.

Section "OutputClass"
    Identifier  "intel"
    MatchDriver "i915"
    Driver      "modesetting"
    Option      "PrimaryGPU" "yes"
EndSection
