# Pin XKB layout at the Xorg layer so it survives libinput device
# re-enumeration (e.g. after DPMS wake, USB hub re-seat, etc.).
#
# Layout and model match the currently-configured state (setxkbmap -query:
# rules=evdev, model=pc105, layout=us, no options). Change this file if
# you switch to a different layout — setxkbmap alone is insufficient
# because Xorg recreates the config on every device re-enumeration.
#
# Ref: freedesktop bug 71168 (XKB lost on resume, closed Won't Fix 2013).

Section "InputClass"
    Identifier      "system-keyboard"
    MatchIsKeyboard "on"
    Option          "XkbRules"  "evdev"
    Option          "XkbModel"  "pc105"
    Option          "XkbLayout" "us"
EndSection
