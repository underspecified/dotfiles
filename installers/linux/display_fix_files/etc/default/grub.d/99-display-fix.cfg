# GRUB drop-in: kernel params for the i3lock-freeze fix.
#
# Sourced by update-grub AFTER /etc/default/grub, so appending to
# GRUB_CMDLINE_LINUX_DEFAULT here preserves existing params without
# modifying the primary file.
#
# Params:
#   i915.enable_psr=0   PSR (Panel Self Refresh) is an eDP power feature
#                       with zero benefit on external DP monitors and is
#                       the documented cause of LP #2065096 and drm/intel
#                       issue #10284 on kernel 6.8. Intel themselves
#                       recommend disabling PSR on external DP displays.
#   i915.enable_fbc=0   FBC (Framebuffer Compression) has wake artifacts
#                       on Gen9-Gen12. Defensive; negligible power cost.
#                       Ships disabled by default on several distros.
#
# Both params are namespaced to the i915 kernel module (Intel). They
# cannot affect the NVIDIA driver stack -- different kernel module,
# different PCI device binding.
#
# Revert: delete this file and run sudo update-grub.

GRUB_CMDLINE_LINUX_DEFAULT="$GRUB_CMDLINE_LINUX_DEFAULT i915.enable_psr=0 i915.enable_fbc=0"
