### i3 bar config: needs color definiton from themes/selenized-*.conf

# Start i3bar to display a workspace bar (plus the system information i3status
# finds out, if available)
bar {
    font pango:Meslo LG S Regular Nerd Font Complete 10
    #mode hide
    status_command i3status

    colors {
        separator #0072d4
        background #fbf3db
        statusline #3a4d53
        focused_workspace #0072d4 #0072d4 #fbf3db
        active_workspace #009c8f #0072d4 #ece3cc
        inactive_workspace #ece3cc #ece3cc #53676d
        urgent_workspace #d2212d #d2212d #ece3cc
    }
}
