# Place a copy of this config to ~/.aerospace.toml
# After that, you can edit ~/.aerospace.toml to your liking

# You can use it to add commands that run after login to macOS user session.
# 'start-at-login' needs to be 'true' for 'after-login-command' to work
# Available commands: https://nikitabobko.github.io/AeroSpace/commands
after-login-command = []

# You can use it to add commands that run after AeroSpace startup.
# 'after-startup-command' is run after 'after-login-command'
# Available commands : https://nikitabobko.github.io/AeroSpace/commands
after-startup-command = ['exec-and-forget /opt/homebrew/bin/borders']

# Start AeroSpace at login
start-at-login = false

# Normalizations. See: https://nikitabobko.github.io/AeroSpace/guide#normalization
enable-normalization-flatten-containers = true
enable-normalization-opposite-orientation-for-nested-containers = true

# See: https://nikitabobko.github.io/AeroSpace/guide#layouts
# The 'accordion-padding' specifies the size of accordion padding
# You can set 0 to disable the padding feature
accordion-padding = 30

# Possible values: tiles|accordion
default-root-container-layout = 'tiles'

# Possible values: horizontal|vertical|auto
# 'auto' means: wide monitor (anything wider than high) gets horizontal orientation,
#               tall monitor (anything higher than wide) gets vertical orientation
default-root-container-orientation = 'auto'

# Mouse follows focus when focused monitor changes
# Drop it from your config, if you don't like this behavior
# See https://nikitabobko.github.io/AeroSpace/guide#on-focus-changed-callbacks
# See https://nikitabobko.github.io/AeroSpace/commands#move-mouse
# Fallback value (if you omit the key): on-focused-monitor-changed = []
on-focused-monitor-changed = ['move-mouse monitor-lazy-center']

# You can effectively turn off macOS "Hide application" (cmd-h) feature by
# toggling this flag
# Useful if you don't use this macOS feature, but accidentally hit cmd-h or
# cmd-alt-h key
# Also see: https://nikitabobko.github.io/AeroSpace/goodies#disable-hide-app
automatically-unhide-macos-hidden-apps = false

# Possible values: (qwerty|dvorak)
# See https://nikitabobko.github.io/AeroSpace/guide#key-mapping
[key-mapping]
preset = 'qwerty'

# Gaps between windows (inner-*) and between monitor edges (outer-*).
# Possible values:
# - Constant:     gaps.outer.top = 8
# - Per monitor:  gaps.outer.top = [{ monitor.main = 16 }, { monitor."some-pattern" = 32 }, 24]
# In this example, 24 is a default value when there is no match.
# Monitor pattern is the same as for
# 'workspace-to-monitor-force-assignment'.
# See:
# https://nikitabobko.github.io/AeroSpace/guide#assign-workspaces-to-monitors
[gaps]
inner.horizontal = 14
inner.vertical = 14
outer.left = 8
outer.bottom = 10
outer.top = 4
outer.right = 8

[exec]
inherit-env-vars = true

[exec.env-vars]
PATH = '${HOME}/.local/bin:${HOME}/.config/aerospace/bin:/opt/homebrew/bin:/opt/homebrew/sbin:${PATH}'

# 'main' binding mode declaration
# See: https://nikitabobko.github.io/AeroSpace/guide#binding-modes
# 'main' binding mode must be always presented
# Fallback value (if you omit the key): mode.main.binding = {}
[mode.main.binding]

# All possible keys:
# - Letters.        a, b, c, ..., z
# - Numbers.        0, 1, 2, ..., 9
# - Keypad numbers. keypad0, keypad1, keypad2, ..., keypad9
# - F-keys.         f1, f2, ..., f20
# - Special keys.   minus, equal, period, comma, slash, backslash, quote,
#                   semicolon, backtick, leftSquareBracket, rightSquareBracket,
#                   space, enter, esc, backspace, tab
# - Keypad special. keypadClear, keypadDecimalMark, keypadDivide, keypadEnter,
#                   keypadEqual, keypadMinus, keypadMultiply, keypadPlus
# - Arrows.         left, down, up, right

# All possible modifiers: cmd, alt, ctrl, shift

# All possible commands: https://nikitabobko.github.io/AeroSpace/commands

# See: https://nikitabobko.github.io/AeroSpace/commands#exec-and-forget
# You can uncomment the following lines to open up terminal with alt + enter s
# shortcut (like in i3)
# alt-enter = '''exec-and-forget osascript -e '
# tell application "kitty"
#     do script
#     activate
# end tell'
# '''

### Launch apps
# application launcher: Alfred
ctrl-alt-space = 'exec-and-forget open_alfred'
# change themes
ctrl-alt-d = 'exec-and-forget change_theme.sh'
# refresh borders
ctrl-alt-b = 'exec-and-forget borders_auto'
# open drafts
shift-ctrl-alt-d = 'exec-and-forget open_drafts'
# terminal: kitty
ctrl-alt-enter = 'exec-and-forget open_kitty'
# broswer: Safari
shift-ctrl-alt-enter = 'exec-and-forget open_safari'
# finder
shift-ctrl-alt-f = 'exec-and-forget open_finder'

# See: https://nikitabobko.github.io/AeroSpace/commands#layout
ctrl-alt-slash = 'layout tiles horizontal vertical'
ctrl-alt-comma = 'layout accordion horizontal vertical'
ctrl-alt-period = 'layout floating tiling'

ctrl-alt-left = 'focus --boundaries-action wrap-around-the-workspace left'
ctrl-alt-down = 'focus --boundaries-action wrap-around-the-workspace down'
ctrl-alt-up = 'focus --boundaries-action wrap-around-the-workspace up'
ctrl-alt-right = 'focus --boundaries-action wrap-around-the-workspace right'

ctrl-alt-shift-left = ['fullscreen off', 'layout tiling', 'move left']
ctrl-alt-shift-down = ['fullscreen off', 'layout tiling', 'move down']
ctrl-alt-shift-up = ['fullscreen off', 'layout tiling', 'move up']
ctrl-alt-shift-right = ['fullscreen off', 'layout tiling', 'move right']

cmd-ctrl-alt-left = [
    'fullscreen off',
    'layout tiling',
    'join-with left',
    'layout accordion',
]
cmd-ctrl-alt-down = [
    'fullscreen off',
    'layout tiling',
    'join-with down',
    'layout accordion',
]
cmd-ctrl-alt-up = [
    'fullscreen off',
    'layout tiling',
    'join-with up',
    'layout accordion',
]
cmd-ctrl-alt-right = [
    'fullscreen off',
    'layout tiling',
    'join-with right',
    'layout accordion',
]

ctrl-alt-f = 'fullscreen'
ctrl-alt-shift-space = 'layout floating tiling'
ctrl-alt-s = 'layout v_accordion' # 'layout stacking' in i3
ctrl-alt-w = 'layout h_accordion' # 'layout tabbed' in i3
ctrl-alt-e = 'layout tiles horizontal vertical' # 'layout toggle split' in i3

# See: https://nikitabobko.github.io/AeroSpace/commands#resize
ctrl-alt-minus = 'resize smart -50'
ctrl-alt-equal = 'resize smart +50'

# See: https://nikitabobko.github.io/AeroSpace/commands#workspace
ctrl-alt-1 = 'workspace 1'
ctrl-alt-2 = 'workspace 2'
ctrl-alt-3 = 'workspace 3'
ctrl-alt-4 = 'workspace 4'
ctrl-alt-5 = 'workspace 5'
ctrl-alt-6 = 'workspace 6'
ctrl-alt-7 = 'workspace 7'
ctrl-alt-8 = 'workspace 8'
ctrl-alt-9 = 'workspace 9'
ctrl-alt-0 = 'exec-and-forget empty_ws'

# See: https://nikitabobko.github.io/AeroSpace/commands#move-node-to-workspace
ctrl-alt-shift-1 = 'move-node-to-workspace 1'
ctrl-alt-shift-2 = 'move-node-to-workspace 2'
ctrl-alt-shift-3 = 'move-node-to-workspace 3'
ctrl-alt-shift-4 = 'move-node-to-workspace 4'
ctrl-alt-shift-5 = 'move-node-to-workspace 5'
ctrl-alt-shift-6 = 'move-node-to-workspace 6'
ctrl-alt-shift-7 = 'move-node-to-workspace 7'
ctrl-alt-shift-8 = 'move-node-to-workspace 8'
ctrl-alt-shift-9 = 'move-node-to-workspace 9'
ctrl-alt-shift-0 = 'exec-and-forget move_to_empty_ws'


ctrl-left = 'exec-and-forget prev_ws'
ctrl-right = 'exec-and-forget next_ws'
ctrl-alt-shift-tab = 'exec-and-forget prev_ws'
ctrl-alt-tab = 'exec-and-forget next_ws'

