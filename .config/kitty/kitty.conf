# host-specified display settings
include display.conf

# Layout
enabled_layouts grid, *

# Behavior
confirm_os_window_close 0
shell zsh
editor zed
allow_remote_control yes
listen_on unix:/tmp/mykitty
linux_display_server auto


# BEGIN_KITTY_FONTS
font_family      family='iMWritingMono Nerd Font Mono' postscript_name=IMWritingMonoNFM-Regular
bold_font        auto
italic_font      auto
bold_italic_font auto
# END_KITTY_FONTS
